<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic Inputs Policy Monitor — Global Trade Alert</title>
  <link rel="icon" type="image/svg+xml" href="gta-favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root {
      /* GTA canonical palette — verified against templates/visual-library/gta-charts/palette.yaml */
      --gta-navy:#0E334D;          /* dk2 — title weight, header bar */
      --gta-navy-bar:#003366;      /* chart chrome 3pt bar */
      --gta-blue:#1874CD;          /* primary blue — single-emphasis colour */
      --gta-blue-deep:#0F599D;     /* neutral.blue[0] */
      --gta-blue-light:#7DC3F8;    /* neutral.blue[3] */
      --gta-teal:#37B7C3;          /* accent4 — GTA panel signature */
      --gta-deep-teal:#088395;     /* accent5 */

      /* Surfaces — page is the GTA light-blue backdrop, cards highlight in white */
      --bg:#E8EEF5;                /* page background (chrome.background) */
      --card:#FFFFFF;              /* highlight surface — every card sits on white */
      --surface:#F7F7F7;           /* lt2 — subtle utility fill (table headers, hover) */
      --border:#D8D8D8;            /* gridline + card borders */
      --border-2:#9A9A9A;          /* neutral.grey[2] */

      /* Text */
      --text:#1A1A2E;              /* near-black title text (chrome.title_text) */
      --text-muted:#595959;        /* dk1 — body grey */
      --text-dim:#797979;          /* neutral.grey[1] */

      /* Evaluation (semantic) */
      --harmful:#B6242E;           /* evaluation.red[0] */
      --liberalising:#1E752A;      /* evaluation.green[0] */

      /* Aliases preserved so existing rules keep cascading */
      --accent:var(--gta-navy);
      --accent-dim:rgba(14,51,77,.08);

      /* Typography — GTA brand: Open Sans (titles) + Helvetica Neue (body) + Roboto Mono (data) */
      --font-d:'Open Sans','Helvetica Neue',Arial,sans-serif;
      --font-b:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',Arial,sans-serif;
      --font-m:'Roboto Mono','Roboto',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text-muted);font-family:var(--font-b);font-size:14px;line-height:1.6;padding-top:138px;}

    /* Header — GTA navy hero band, fixed across full viewport so it never scrolls away.
       Three-line lockup: title, subtitle, last-updated meta with live pulse. */
    .hdr{position:fixed;top:0;left:0;right:0;width:100%;z-index:300;height:138px;background:var(--gta-navy);border-bottom:1px solid var(--gta-navy);display:flex;align-items:center;justify-content:space-between;padding:20px 32px;color:#FFFFFF;box-shadow:0 1px 0 rgba(0,0,0,.05);}
    .hdr-brand{display:flex;align-items:center;gap:18px;min-width:0;}
    .hdr-download{display:flex;align-items:center;gap:8px;padding:9px 16px;background:#E8EEF5;border:1px solid #D8D8D8;color:#0E334D;font-family:'Roboto Mono','Roboto',monospace;font-size:11px;font-weight:400;text-decoration:none;white-space:nowrap;transition:background .15s,border-color .15s;flex-shrink:0;box-sizing:border-box;-webkit-appearance:none;appearance:none;line-height:1;}
    .hdr-download:hover{background:#D8E4F0;border-color:#9A9A9A;}
    .hdr-logo{width:56px;height:56px;flex-shrink:0;}
    .hdr-titles{display:flex;flex-direction:column;gap:6px;min-width:0;}
    .hdr-title{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:-0.005em;color:#FFFFFF;line-height:1.15;white-space:nowrap;}
    .hdr-sub{font-size:14px;color:#FFFFFF;font-weight:400;line-height:1.35;white-space:nowrap;}
    /* Updated-meta sits one small gap below the subtitle, with the live pulse aligned to it */
    .hdr-meta{display:flex;align-items:center;gap:9px;margin-top:6px;}
    .hdr-updated{font-family:var(--font-m);font-size:11px;color:#3B97ED;letter-spacing:.02em;white-space:nowrap;}
    .pulse{width:8px;height:8px;border-radius:50%;background:#3B97ED;box-shadow:0 0 6px #3B97ED;animation:blink 2.4s ease-in-out infinite;flex-shrink:0;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

    .layout{display:grid;grid-template-columns:224px 1fr;min-height:calc(100vh - 138px);}

    /* Sidebar — white rail floats over the blue page */
    .sidebar{position:sticky;top:138px;height:calc(100vh - 138px);overflow-y:auto;border-right:1px solid var(--border);padding:24px 0 40px;background:var(--card);}
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .nav-lbl{font-family:var(--font-d);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gta-blue);font-weight:600;padding:0 22px 6px;}
    .nav-lbl+.nav-lbl,.nav-a+.nav-lbl{margin-top:14px;}
    .nav-a{display:flex;align-items:center;gap:10px;padding:8px 22px;border-left:3px solid transparent;text-decoration:none;transition:background .12s,border-color .12s;}
    .nav-a:hover{background:var(--surface);border-left-color:var(--border);}
    .nav-a.on{background:var(--bg);border-left-color:var(--gta-blue);}
    .nav-idx{font-family:var(--font-m);font-size:9px;color:var(--text-dim);width:18px;flex-shrink:0;}
    .nav-a.on .nav-idx{color:var(--gta-blue);}
    .nav-name{font-size:12px;font-weight:400;color:var(--text-muted);flex:1;}
    .nav-a.on .nav-name{color:var(--gta-navy);font-weight:600;}
    .nav-n{font-family:var(--font-m);font-size:10px;color:var(--text-dim);}
    .nav-a.on .nav-n{color:var(--gta-navy);}

    .content{padding:36px 44px 80px;max-width:1080px;}

    /* Overview block — white card with teal signature stripe, sits on the blue page */
    .overview-blk{margin-bottom:32px;padding:22px 26px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gta-navy);}
    .blk-tag{font-family:var(--font-d);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gta-blue);font-weight:600;margin-bottom:8px;}
    .overview-txt{font-size:13px;line-height:1.75;color:var(--text-muted);font-weight:400;}

    /* Summary section — white card, no top-rule (anti-AI rule §1), teal signature stripe left */
    .sum-sec{margin-bottom:52px;padding:26px 30px 22px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gta-navy);scroll-margin-top:72px;}
    .sum-hdr{margin-bottom:18px;}
    .sum-title{font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:0;color:var(--gta-navy);}
    .sum-sub{font-size:11px;color:var(--text-muted);font-style:normal;margin-top:3px;}
    .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    /* Sum cards take a soft blue tint so they read as a sub-level inside the white parent panel */
    .sum-card{background:var(--bg);border:1px solid var(--border);padding:14px 16px 12px;display:flex;flex-direction:column;gap:5px;text-decoration:none;transition:background .14s,border-color .14s;}
    .sum-card:hover{background:var(--surface);border-color:var(--gta-blue);}
    .sum-card-idx{font-family:var(--font-m);font-size:9px;letter-spacing:.10em;color:var(--gta-blue);font-weight:500;}
    .sum-card-name{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--gta-navy);}
    .sum-card-bottom{display:flex;align-items:baseline;justify-content:space-between;margin-top:4px;}
    .sum-card-total{font-family:var(--font-m);font-size:22px;font-weight:500;color:var(--gta-blue);line-height:1;}
    .sum-card-lbl{font-size:10px;color:var(--text-muted);}
    .sum-card-bar{height:2px;background:var(--border);margin-top:8px;}
    .sum-card-bar-fill{height:100%;background:var(--gta-blue);}

    /* Product sections */
    .prod{scroll-margin-top:72px;}
    .prod-hdr{padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
    .prod-idx{font-family:var(--font-m);font-size:10px;letter-spacing:.10em;color:var(--gta-blue);font-weight:500;margin-bottom:4px;}
    .prod-name{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--gta-navy);letter-spacing:-0.005em;}

    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px;}
    .kpi{background:var(--card);border:1px solid var(--border);padding:16px 16px 12px;position:relative;}
    .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gta-navy-bar);}
    .kpi-lbl{font-family:var(--font-d);font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--gta-blue);margin-bottom:8px;font-weight:600;}
    .kpi-val{font-family:var(--font-m);font-size:28px;font-weight:500;color:var(--gta-blue);line-height:1;}
    .kpi-val.harm{color:var(--harmful);}.kpi-val.lib{color:var(--liberalising);}
    .kpi-sub{font-size:10px;color:var(--text-muted);margin-top:4px;}
    .kpi-sub.up{color:var(--harmful);}.kpi-sub.down{color:var(--liberalising);}

    .charts{display:grid;grid-template-columns:210px 1fr;gap:10px;margin-bottom:10px;}

    /* Chart card — GTA chart signature: 3pt navy top bar, white card on the blue page, primary-blue title */
    .chart-card{position:relative;background:var(--card);border:1px solid var(--border);padding:18px 18px 14px;}
    .chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gta-navy-bar);}
    .chart-ttl{font-family:var(--font-d);font-size:13px;font-weight:600;color:var(--gta-blue);margin-bottom:14px;letter-spacing:0;text-transform:none;}
    .donut-wrap{position:relative;height:128px;display:flex;align-items:center;justify-content:center;}
    .bar-wrap{position:relative;height:152px;}
    .legend{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
    .leg{display:flex;align-items:center;gap:8px;font-size:11px;}
    .leg-dot{width:8px;height:8px;flex-shrink:0;}
    .leg-lbl{color:var(--text-muted);flex:1;}.leg-val{font-family:var(--font-m);font-size:11px;color:var(--gta-navy);font-weight:500;}

    /* Map card — same GTA chart signature, white card on the blue page */
    .map-card{position:relative;background:var(--card);border:1px solid var(--border);padding:18px 18px 14px;margin-bottom:48px;}
    .map-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gta-navy-bar);}
    .map-svg-wrap{width:100%;height:300px;position:relative;}
    .map-svg-wrap svg{width:100%;height:100%;}
    .map-legend-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px;}
    .map-legend-label{font-family:var(--font-d);font-size:10px;color:var(--text-muted);}
    .map-legend-gradient{width:100px;height:8px;}

    .divider{height:1px;background:var(--border);margin:0 0 48px;}

    /* Methodology */
    .meth-sec{margin-top:64px;padding-top:40px;border-top:1px solid var(--border);scroll-margin-top:72px;}
    .meth-title{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--gta-navy);margin-bottom:8px;}
    .meth-intro{font-size:13px;color:var(--text-muted);line-height:1.75;margin-bottom:24px;max-width:680px;}
    .meth-sub{font-family:var(--font-d);font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--gta-blue);font-weight:600;margin-bottom:12px;margin-top:28px;}
    .hs-table{width:100%;border-collapse:collapse;font-size:12px;}
    .hs-table th{font-family:var(--font-d);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:9px 12px;border-bottom:2px solid var(--gta-navy);background:#FFFFFF;font-weight:600;}
    .hs-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-muted);vertical-align:top;line-height:1.6;background:#FFFFFF;}
    .hs-table td:first-child{color:var(--gta-navy);font-weight:600;}
    .hs-table .code{font-family:var(--font-m);font-size:10px;color:var(--gta-blue);}
    .hs-table tr:hover td{background:var(--surface);}
    .pg-list{display:flex;flex-direction:column;gap:10px;}
    /* GTA panel signature: 1.75pt-equivalent teal left stripe + sharp corners */
    .pg-item{padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gta-navy);}
    .pg-name{font-family:var(--font-d);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--gta-navy);margin-bottom:5px;text-transform:uppercase;}
    .pg-types{font-size:12px;color:var(--text-muted);line-height:1.7;}
    .credit{margin-top:48px;padding-top:18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);}
    .credit a{color:var(--gta-blue);text-decoration:none;border-bottom:1px solid transparent;}
    .credit a:hover{border-bottom-color:var(--gta-blue);}

    /* D3 map styles — GTA neutral.blue sequential on a white ocean,
       restored to the earlier minimal style: clean white country separators,
       subtle visible graticule, no extra outlines on no-data countries. */
    .country{stroke:#FFFFFF;stroke-width:0.5px;transition:opacity .15s;}
    .country:hover{opacity:.78;cursor:default;}
    .country-zero{fill:#F2F2F2;}
    .graticule{fill:none;stroke:#D8D8D8;stroke-width:0.3px;opacity:.5;}
    .sphere{fill:#FFFFFF;stroke:var(--border);stroke-width:0.5px;}

    /* Back-to-top */
    #back-top{position:fixed;bottom:24px;right:24px;z-index:900;width:36px;height:36px;background:rgba(14,51,77,0.55);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s,background .15s;}
    #back-top.visible{opacity:1;pointer-events:auto;}
    #back-top:hover{background:rgba(14,51,77,0.85);}
    #back-top svg{display:block;}

    /* ── Slide-out drawer ───────────────────────────────────────────────────── */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:800;
      opacity:0;pointer-events:none;transition:opacity .25s;}
    .drawer-overlay.open{opacity:1;pointer-events:auto;}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;
      background:var(--bg);z-index:801;transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;
      box-shadow:-6px 0 32px rgba(0,0,0,.14);display:flex;flex-direction:column;}
    .drawer.open{transform:translateX(0);}
    .drawer-head{display:flex;align-items:flex-start;justify-content:space-between;
      padding:20px 20px 16px;border-bottom:1px solid var(--border);position:sticky;
      top:0;background:var(--bg);z-index:1;}
    .drawer-product{font-family:var(--font-d);font-size:13px;font-weight:700;
      color:var(--gta-navy);letter-spacing:.04em;text-transform:uppercase;}
    .drawer-subtitle{font-size:11px;color:var(--text-dim);margin-top:3px;}
    .drawer-close{background:none;border:none;cursor:pointer;color:var(--text-dim);
      font-size:18px;line-height:1;padding:2px 6px;margin-top:-2px;
      transition:color .15s;flex-shrink:0;}
    .drawer-close:hover{color:var(--gta-navy);}
    .drawer-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
    .entry-card{border:1px solid var(--border);border-radius:4px;padding:14px 14px 12px;
      position:relative;transition:border-color .15s;background:#FFFFFF;}
    .entry-card:hover{border-color:#9A9A9A;}
    .entry-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .eval-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:1px;}
    .entry-date{font-size:10px;color:var(--text-dim);font-family:var(--font-d);
      letter-spacing:.04em;flex:1;}
    .entry-view{font-size:10px;color:var(--gta-blue);font-family:var(--font-d);
      letter-spacing:.04em;text-decoration:none;flex-shrink:0;
      border-bottom:1px solid transparent;transition:border-color .15s;}
    .entry-view:hover{border-bottom-color:var(--gta-blue);}
    .entry-type{font-size:10px;color:var(--text-muted);font-family:var(--font-d);
      letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;}
    .entry-title{font-size:13px;color:var(--text-main);line-height:1.45;}
    .kpi{cursor:pointer;transition:box-shadow .15s,border-color .15s;}
    .kpi:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}

    /* Tooltip — light card, navy text */
    .map-tooltip{
      position:fixed;pointer-events:none;
      background:#FFFFFF;border:1px solid var(--gta-navy);
      padding:7px 10px;font-family:var(--font-d);font-size:11px;
      color:var(--gta-navy);font-weight:500;
      box-shadow:0 4px 12px rgba(14,51,77,.15);
      opacity:0;transition:opacity .12s;z-index:500;
    }
  </style>
</head>

<div class="map-tooltip" id="map-tip"></div>

<header class="hdr">
  <div class="hdr-brand">

const fmt=n=>(n==null?'—':Number(n).toLocaleString());

function buildNav(products){
  const nav=document.getElementById('js-nav');nav.innerHTML='';
  const addLbl=t=>{const d=document.createElement('div');d.className='nav-lbl';d.textContent=t;nav.appendChild(d);};
  const addLink=(href,di,name,count)=>{const a=document.createElement('a');a.href=href;a.className='nav-a';a.dataset.i=di;a.innerHTML=`<span class="nav-idx">${(di==='sum'||di==='meth'||di==='cont'||di==='about')?'—':'0'+(parseInt(di)+1)}</span><span class="nav-name">${name}</span>${count!=null?`<span class="nav-n">${fmt(count)}</span>`:''}`;nav.appendChild(a);};
  addLbl('Overview');addLink('#about','about','About this dashboard');addLink('#summary','sum','All Products');
  addLbl('Products');
  products.forEach((p,i)=>addLink(`#prod-${i}`,i,p.name,null));
  addLbl('Reference');addLink('#methodology','meth','Methodology');addLink('#contact','cont','Contact');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(!e.isIntersecting)return;document.querySelectorAll('.nav-a').forEach(a=>a.classList.remove('on'));const item=document.querySelector(`.nav-a[data-i="${e.target.dataset.i}"]`);if(item)item.classList.add('on');});},{rootMargin:'-20% 0px -70% 0px'});
  setTimeout(()=>document.querySelectorAll('[data-obs]').forEach(s=>obs.observe(s)),120);
}

function makeDonut(id,ev){
  const ctx=document.getElementById(id).getContext('2d');

  _ch.push(new Chart(ctx,{type:'doughnut',data:{labels:['Harmful (Red + Amber)','Liberalising (Green)'],datasets:[{data:[ev.harmful??0,ev.liberalising??0],backgroundColor:[C.harmful,C.liberalising],borderColor:'#FFFFFF',borderWidth:2,hoverOffset:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${pct(c.raw,tot)})`}}}}}));
}

  const vals=keys.map(k=>groups[k]??0);
  const mx=Math.max(...vals);
  _ch.push(new Chart(ctx,{type:'bar',data:{labels:keys.map(k=>PLABELS[k]),datasets:[{data:vals,backgroundColor:C.policy,borderWidth:0,borderRadius:0,barThickness:16}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:44}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw} interventions`}},datalabels:{anchor:'end',align:'end',offset:4,color:'#0E334D',font:{family:"'Roboto Mono','Roboto',monospace",size:10,weight:'500'},formatter:v=>v>0?v:''}},scales:{x:{grid:{color:'#D8D8D8',drawBorder:false},ticks:{color:'#595959',font:{family:"'Open Sans','Helvetica Neue',Arial,sans-serif",size:10}},max:mx*1.28,border:{display:false}},y:{grid:{display:false,drawBorder:false},ticks:{color:'#595959',font:{family:"'Open Sans','Helvetica Neue',Arial,sans-serif",size:10},callback:(_,i)=>{const l=keys.map(k=>PLABELS[k])[i];return l.length>20?l.slice(0,18)+'…':l;}},border:{display:false}}}}}));
}

// ── World map (D3) ────────────────────────────────────────────────────────
async function loadTopo(){
  if(_worldTopo) return _worldTopo;
  _worldTopo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  return _worldTopo;
}

function makeMap(containerId, implementing){
  const container = document.getElementById(containerId);
  if(!container) return;

  // Build alpha3 → count lookup using Map for clean access
  const countMap = new Map();
  Object.entries(implementing||{}).forEach(([k,v])=>{
    if(v) countMap.set(String(k), Number(v));
  });

  if(countMap.size === 0) return; // no data, leave container empty

  const maxVal = Math.max(...countMap.values(), 1);
  const colorScale = d3.scaleSequential()
    .domain([1, maxVal])
    .interpolator(d3.interpolateRgb('#DCEDFF','#1874CD'));

  loadTopo().then(world=>{
    // Clear any stale SVG
    d3.select(container).selectAll('svg').remove();

    const W = 960, H = 480;
    const svg = d3.select(container).append('svg')
      .attr('viewBox',`0 0 ${W} ${H}`)
      .attr('preserveAspectRatio','xMidYMid meet')
      .style('width','100%').style('height','100%').style('display','block');

    const countries = topojson.feature(world, world.objects.countries);
    const projection = d3.geoNaturalEarth1().fitSize([W,H], countries);
    const path = d3.geoPath().projection(projection);

    // Ocean background
    svg.append('path').datum({type:'Sphere'})
      .attr('fill','#FFFFFF').attr('stroke','#D8D8D8').attr('stroke-width',0.5)
      .attr('d',path);

    // Graticule
    svg.append('path').datum(d3.geoGraticule()())
      .attr('fill','none').attr('stroke','#D8D8D8').attr('stroke-width',0.3).attr('opacity',0.5)
      .attr('d',path);

    const tip = document.getElementById('map-tip');

    // Country fills — inline style to avoid CSS specificity conflicts
    svg.selectAll('path.ctry')
      .data(countries.features)
      .join('path')
      .attr('class','ctry')
      .attr('stroke','#FFFFFF')
      .attr('stroke-width',0.5)
      .style('transition','opacity .15s')
      .attr('d', path)
      .each(function(d){
        const alpha3 = ISO_TO_ALPHA3[d.id];
        const count  = alpha3 ? countMap.get(alpha3) : null;
        d3.select(this).attr('fill', count ? colorScale(count) : '#F2F2F2');
      })
      .on('mousemove', function(event,d){
        const alpha3 = ISO_TO_ALPHA3[d.id];
        const count  = alpha3 ? countMap.get(alpha3) : null;
        if(!count){ tip.style.opacity=0; return; }
        const name = ALPHA3_NAMES[alpha3]||alpha3;
        tip.style.opacity=1;
        tip.style.left=(event.clientX+14)+'px';
        tip.style.top=(event.clientY-28)+'px';
        tip.textContent=`${name}: ${count} intervention${count!==1?'s':''}`;
      })
      .on('mouseleave',()=>{ tip.style.opacity=0; });

    // Legend gradient
    const legendEl = container.closest('.map-card')?.querySelector('.map-legend-gradient');
    if(legendEl) legendEl.style.background='linear-gradient(to right,#DCEDFF 0%,#7DC3F8 50%,#1874CD 100%)';

  }).catch(err=>{
    console.error('Map load error:',err);
    container.innerHTML='<div style="color:#797979;font-size:10px;padding:16px;text-align:center;">Map unavailable — requires network access</div>';
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function render(data){
  _ch.forEach(c=>c.destroy());_ch=[];
  buildNav(data.products);
  document.getElementById('js-updated').textContent = `Updated ${data.last_updated}`;
  const root=document.getElementById('js-content');root.innerHTML='';

  // Overview text
  const ov=document.createElement('div');ov.className='overview-blk';ov.id='about';ov.dataset.i='about';ov.setAttribute('data-obs','');
  ov.innerHTML=`<div class="blk-tag">About this dashboard</div><p class="overview-txt">${data.overview}</p>`;
  root.appendChild(ov);

  // Summary grid — no HS codes

    c.innerHTML=`<div class="sum-card-idx">0${i+1}</div><div class="sum-card-name">${p.name}</div><div class="sum-card-bottom"><span class="sum-card-total">${fmt(p.total_interventions)}</span><span class="sum-card-lbl">interventions</span></div><div class="sum-card-bar"><div class="sum-card-bar-fill" style="width:${bw}%"></div></div>`;
    sg.appendChild(c);
  });

  // Product sections
  data.products.forEach((p,i)=>{
    const ev=p.evaluation??{};const pg=p.policy_groups??{};
    const evT=(ev.harmful??0)+(ev.liberalising??0);
    const w=wow(p.wow_change);const wc='';
    const sec=document.createElement('section');sec.className='prod';sec.id=`prod-${i}`;sec.dataset.prodIdx=i;sec.dataset.i=i;sec.setAttribute('data-obs','');
    sec.innerHTML=`
      <div class="prod-hdr">
        <div class="prod-idx">PRODUCT 0${i+1} / 09 — GTA DATA</div>
        <h2 class="prod-name">${p.name}</h2>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="kpi-lbl">Total Policy Interventions</div><div class="kpi-val">${fmt(p.total_interventions)}</div><div class="kpi-sub">since 28 Feb 2026</div></div>
        <div class="kpi"><div class="kpi-lbl">New Interventions This Week</div><div class="kpi-val ${wc}">${p.wow_change!=null?(p.wow_change>0?'+':'')+p.wow_change:'—'}</div><div class="kpi-sub">${w.t}</div></div>
        <div class="kpi"><div class="kpi-lbl">Restrictive Share</div><div class="kpi-val harm">${pct(ev.harmful,evT)}</div><div class="kpi-sub">${fmt(ev.harmful)} interventions (Red + Amber)</div></div>
        <div class="kpi"><div class="kpi-lbl">Liberalising Share</div><div class="kpi-val lib">${pct(ev.liberalising,evT)}</div><div class="kpi-sub">${fmt(ev.liberalising)} interventions (Green)</div></div>
      </div>
      <div class="charts">
        <div class="chart-card">
          <div class="chart-ttl">Protectionist Dynamics</div>
          <div class="donut-wrap"><canvas id="d-${i}"></canvas></div>
          <div class="legend">
            <div class="leg"><div class="leg-dot" style="background:${C.harmful}"></div><span class="leg-lbl">Harmful (Red + Amber)</span><span class="leg-val">${fmt(ev.harmful)}</span></div>
            <div class="leg"><div class="leg-dot" style="background:${C.liberalising}"></div><span class="leg-lbl">Liberalising (Green)</span><span class="leg-val">${fmt(ev.liberalising)}</span></div>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-ttl">Policy Instrument Composition</div>
          <div class="bar-wrap"><canvas id="b-${i}"></canvas></div>
        </div>
      </div>
      <div class="map-card">
        <div class="chart-ttl">Geographic Concentration of Policy Activity</div>
        <div class="map-svg-wrap" id="map-${i}"></div>
        <div class="map-legend-row">
          <span class="map-legend-label">Fewer</span>
          <div class="map-legend-gradient" style="width:90px;height:6px;border-radius:3px;"></div>
          <span class="map-legend-label">More interventions</span>
        </div>
      </div>
      ${i<data.products.length-1?'<div class="divider"></div>':''}`;
    root.appendChild(sec);
    requestAnimationFrame(()=>{
      makeDonut(`d-${i}`,ev);
      makeBar(`b-${i}`,pg);
      makeMap(`map-${i}`, p.implementing||{});
    });
  });

  // Methodology
  const meth=document.createElement('section');meth.className='meth-sec';meth.id='methodology';meth.dataset.i='meth';meth.setAttribute('data-obs','');
  const hsRows=data.products.map(p=>`<tr><td>${p.name}</td><td><span class="code">${(p.hs_codes||[]).join('&nbsp;·&nbsp;')}</span></td><td>${p.description}</td></tr>`).join('');
  const pgItems=Object.keys(PLABELS).map(k=>`<div class="pg-item"><div class="pg-name">${PLABELS[k]}</div><div class="pg-types">${PDEFS[k]}</div></div>`).join('');
  meth.innerHTML=`
    <h2 class="meth-title">Methodological Note</h2>
    <p class="meth-intro">All intervention counts are sourced from the Global Trade Alert (GTA) database and cover announcements recorded from 28 February 2026 onwards. Interventions are counted as affecting a product category if at least one of the relevant HS-6 codes is among the affected products. Each intervention is identified by a unique GTA intervention ID. Because a single intervention can affect multiple HS codes spanning different product categories, the same intervention ID may be counted once in each relevant product category — this is by design, as the intervention genuinely affects all those categories. Week-on-week changes compare cumulative counts at two consecutive Saturday reference points. GTA evaluations are applied as follows: <strong style="color:var(--harmful)">Harmful</strong> combines Red (definitely harmful) and Amber (likely harmful); <strong style="color:var(--liberalising)">Liberalising</strong> corresponds to Green evaluations only. The implementing jurisdiction map colours each country proportionally to the number of recorded interventions it has announced affecting the relevant product category.</p>
    <div class="meth-sub">Product Categories and HS-6 Codes</div>
    <table class="hs-table"><thead><tr><th style="width:155px">Product Category</th><th style="width:195px">HS-6 Code(s)</th><th>Crisis Linkage</th></tr></thead><tbody>${hsRows}</tbody></table>

    <div class="meth-sub" style="margin-top:28px">Indicator Definitions</div>
    <dl style="display:grid;grid-template-columns:1fr;gap:14px;margin:0;">
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Total Policy Interventions</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Total number of policy interventions recorded in the GTA database for the selected product group.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">New Interventions This Week</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Change in the number of recorded interventions compared with the previous week, based on Monday snapshots of the GTA database.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Restrictive Share</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Share of policy interventions that impose or increase trade barriers.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Liberalising Share</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Share of policy interventions that reduce or remove trade barriers.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Protectionist Dynamics</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Shows the balance between restrictive and liberalising policy interventions affecting the selected product group.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Policy Instrument Composition</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Shows which policy instruments governments are using more actively when it comes to addressing supply chain concerns affecting the selected product group.</dd>
      </div>
      <div style="border:1px solid var(--border);border-left:3px solid var(--gta-navy);padding:12px 14px;background:var(--surface);">
        <dt style="font-family:var(--font-d);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gta-navy);margin-bottom:5px;">Geographic Concentration of Policy Activity</dt>
        <dd style="font-size:13px;line-height:1.65;color:var(--text-muted);margin:0;">Displays the jurisdictions responsible for the recorded interventions, indicating where policy activity is concentrated.</dd>
      </div>
    </dl>
    <div class="meth-sub" style="margin-top:28px">Policy Group Definitions</div>
    <div class="pg-list">${pgItems}</div>`;
  root.appendChild(meth);
  // Contact section
  const contact=document.createElement('section');contact.id='contact';contact.dataset.i='cont';contact.setAttribute('data-obs','');
  contact.style.cssText='margin-top:48px;padding-top:32px;border-top:1px solid var(--border);';
  contact.innerHTML=`<h2 class="meth-title">Contact</h2><p class="meth-intro">For inquiries related to the scope and presentation of the contents of this dashboard contact <a href="mailto:anaelena.sancho@sgept.org" style="color:var(--gta-blue);text-decoration:none;border-bottom:1px solid var(--border);">anaelena.sancho@sgept.org</a></p>`;
  root.appendChild(contact);
  const cr=document.createElement('p');cr.className='credit';cr.innerHTML=`Data source: <a href="https://www.globaltradealert.org" target="_blank" rel="noopener">Global Trade Alert</a> (SGEPT). All intervention counts based on announcements recorded since 28 February 2026.`;
  root.appendChild(cr);

  // Wire drawer — reassign onclick so it always has the current data closure
  root.onclick = function(e) {
    const kpi = e.target.closest('.kpi');

    if (!section) return;
    const idx = parseInt(section.dataset.prodIdx);
    const product = (data && data.products) ? data.products[idx] : null;
    if (product) openDrawer(product);
  };
}

// Back-to-top button
  document.body.insertAdjacentHTML('beforeend',
    '<button id="back-top" aria-label="Back to top" title="Back to top"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 11V3M3.5 6.5L7 3l3.5 3.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
  );
  const btt=document.getElementById('back-top');
  window.addEventListener('scroll',()=>{btt.classList.toggle('visible',window.scrollY>300);},{passive:true});
  btt.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'});});

  
  // Drawer markup
  document.body.insertAdjacentHTML('beforeend', `
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer" role="dialog" aria-modal="true">
      <div class="drawer-head">
        <div>
          <div class="drawer-product" id="drawer-product-name"></div>
          <div class="drawer-subtitle">5 most recent GTA entries</div>
        </div>
        <button class="drawer-close" id="drawer-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>
  `);

  const EVAL_COLORS = {Red:'#C03838',Amber:'#D4941A',Green:'#28A068',Liberalising:'#28A068'};

  function openDrawer(product) {
    const entries = product.latest_interventions || [];
    document.getElementById('drawer-product-name').textContent = product.name;
    const body = document.getElementById('drawer-body');
    if (!entries.length) {
      body.innerHTML = '<p style="font-size:13px;color:var(--text-dim);padding:8px 0;">Latest entries load from the live dashboard. <a href="https://anaelenasc.github.io/strategic-inputs-monitor/" target="_blank" style="color:var(--gta-blue);">View live →</a></p>';
    } else {
      body.innerHTML = entries.map(e => {
        const dotColor = EVAL_COLORS[e.gta_evaluation] || '#9A9A9A';
        const date = e.date ? new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
        return `<div class="entry-card">
          <div class="entry-top">
            <span class="eval-dot" style="background:${dotColor}" title="${e.gta_evaluation||''}"></span>
            <span class="entry-date">${date}</span>
            ${e.url ? `<a class="entry-view" href="${e.url}" target="_blank" rel="noopener">View on GTA ↗</a>` : ''}
          </div>
          <div class="entry-type">${e.intervention_type||'—'}</div>
          <div class="entry-title">${e.title||'—'}</div>
        </div>`;
      }).join('');
    }
    document.getElementById('drawer-overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

  // Indicators CSV download
  let _dashData=null;
  document.getElementById('btn-dl-indicators').addEventListener('click',()=>{
    if(!_dashData){alert('Data not loaded yet — please wait a moment.');return;}
    const header=['Product Category','Total Interventions','Harmful','Liberalising','Harmful Share %','Liberalising Share %','Export Controls','Import Barriers','Domestic Subsidies','Export Subsidies','Sanctions','Other','Implementing Jurisdictions (ISO: count)'];
    const rows=[header];
    _dashData.products.forEach(p=>{
      const t=p.total_interventions||0;
      const h=p.evaluation?.harmful||0;
      const l=p.evaluation?.liberalising||0;
      const pg=p.policy_groups||{};
      const impl = p.implementing || {};
      const implStr = Object.entries(impl)
        .sort((a,b) => b[1]-a[1])
        .map(([iso,n]) => iso+': '+n)
        .join('; ');
      rows.push([
        p.name,t,h,l,
        t?Math.round(h/t*1000)/10:'',
        t?Math.round(l/t*1000)/10:'',
        pg.export_controls||0,pg.import_barriers||0,pg.domestic_subsidies||0,
        pg.export_subsidies||0,pg.sanctions||0,pg.other||0,implStr
      ]);
    });
    const csv=rows.map(r=>r.map(v=>JSON.stringify(v??'')).join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='strategic_inputs_indicators.csv';
    a.click();
  });


  fetch('data/dashboard.json')
  .then(r => r.json())
  .then(d => { _dashData = d; render(d); })
  .catch(() => { _dashData = DATA; render(DATA); });
</script>
